<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/com-cal/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interest Calculator</title>
  <script type="module" crossorigin src="/com-cal/assets/index-Ck898Qts.js"></script>
  <link rel="stylesheet" crossorigin href="/com-cal/assets/index--v9Fp67Z.css">
</head>

<body>
  <div class="app-container">
    <header>
      <h1>SmartCalc</h1>
      <p class="subtitle">Interest Calculator</p>
    </header>

    <main>
      <div id="screenshot-area">
        <!-- Calculator Inputs -->
        <section class="card calculator-card">
          <h2>Parameters</h2>
          <div class="input-grid">
            <div class="input-group">
              <label for="principal">Initial Value</label>
              <input type="text" id="principal" inputmode="numeric" placeholder="xx,xx,xxx">
            </div>
            <div class="input-group print-hide">
              <label for="rate">Rate Of Intrest</label>
              <select id="rate">
                <option value="1">1</option>
                <option value="1.25">1.25</option>
                <option value="1.5">1.5</option>
                <option value="1.92">1.92</option>
                <option value="2">2</option>
                <option value="2.5">2.5</option>
              </select>
            </div>
            <div class="input-group">
              <label for="annual-rate">Annual</label>
              <input type="text" id="annual-rate" value="12.00%" readonly class="readonly-input">
            </div>
            <div class="input-group">
              <label for="start-date">Start Date</label>
              <input type="text" id="start-date" placeholder="Select Date">
            </div>
            <div class="input-group">
              <label for="end-date">End Date</label>
              <input type="text" id="end-date" placeholder="Select Date">
            </div>
            <div class="input-group print-hide">
              <label>Calculation Mode</label>
              <div class="mode-toggle">
                <button class="mode-btn active" id="mode-flat" data-mode="flat" type="button">Flat</button>
                <button class="mode-btn" id="mode-daily" data-mode="daily" type="button">Daily</button>
              </div>
            </div>
          </div>

          <!-- Transactions Area -->
          <div class="transaction-section">
            <h2>Transactions</h2>

            <div class="transaction-controls">
              <div class="input-group">
                <label for="transaction-date">Date</label>
                <input type="text" id="transaction-date" placeholder="Select Date">
              </div>
              <div class="input-group">
                <label for="transaction-type">Type</label>
                <select id="transaction-type">
                  <option value="credit">Credit (+)</option>
                  <option value="debit">Debit (-)</option>
                </select>
              </div>
              <div class="input-group">
                <label for="transaction-amount">Amount</label>
                <input type="text" id="transaction-amount" inputmode="numeric" placeholder="xx,xx,xxx">
              </div>
              <button class="btn btn-secondary" id="add-transaction-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="5" x2="12" y2="19"></line>
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Add
              </button>
            </div>

            <!-- List of Transactions -->
            <div id="transaction-list" class="transaction-list">
              <p class="empty-state">No transactions added yet.</p>
            </div>
          </div>

          <!-- Action Button -->
          <button class="btn btn-primary btn-block" id="calculate-btn">Calculate Interest</button>
        </section>

        <!-- Results Section (Hidden by Default) -->
        <section class="results-section hidden" id="results-section">
          <div class="card" id="results-card">
            <h2>Interest</h2>
            <div class="interest-result">
              <div class="interest-main">
                <span class="interest-mode-label" id="result-mode-label">Flat</span>
                <div class="interest-amount highlight-value" id="interest-earned">+0.00 Units</div>
              </div>
            </div>
          </div>
        </section>
        <div id="screenshot-watermark" class="screenshot-watermark"></div>
      </div>

      <button class="btn btn-secondary btn-block" id="screenshot-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 6 2 18 2 18 9"></polyline>
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
          <rect x="6" y="14" width="12" height="8"></rect>
        </svg>
        Save as PDF / Print
      </button>

    </main>
  </div>
</body>

</html>
